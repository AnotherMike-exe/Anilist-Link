name: Docker

# Build and publish the container image to Docker Hub.
#   push to main → dogberttech/anilist-link:latest  (release variant)
#   push to dev  → dogberttech/anilist-link:dev      (dev variant, includes dev-tools)
# Both also push an immutable :<sha> tag. Manual runs via workflow_dispatch
# tag according to the selected branch. Requires the DOCKERHUB_USERNAME and
# DOCKERHUB_TOKEN repository secrets.
on:
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags and build variant
        id: meta
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tags=dogberttech/anilist-link:latest,dogberttech/anilist-link:${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "variant=release" >> "$GITHUB_OUTPUT"
          else
            echo "tags=dogberttech/anilist-link:dev,dogberttech/anilist-link:${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "variant=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            BUILD_VARIANT=${{ steps.meta.outputs.variant }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
